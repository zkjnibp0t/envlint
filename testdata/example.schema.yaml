version: "1"
vars:
  - name: APP_ENV
    type: string
    required: true

  - name: APP_PORT
    type: int
    required: true
    default: "8080"

  - name: DATABASE_URL
    type: url
    required: true

  - name: SECRET_KEY
    type: string
    required: true

  - name: LOG_LEVEL
    type: string
    required: false
    default: "info"

  - name: MAX_RETRIES
    type: int
    required: false
    default: "3"

  - name: OLD_DB_URL
    type: url
    required: false
    deprecated: true
    deprecation_note: "use DATABASE_URL instead"

  - name: LEGACY_TOKEN
    type: string
    required: false
    deprecated: true
    deprecation_note: "tokens are no longer required"
